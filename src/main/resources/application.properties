spring.application.name=pruebatecnica

# ===================================================================
# CONFIGURACIÓN DE BASE DE DATOS (H2 EN MEMORIA)
# ===================================================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilitar la consola de H2 por si queremos inspeccionarla en navegador
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===================================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===================================================================
# Indica a Hibernate que cree y destruya las tablas automáticamente con cada ejecución
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ¡ESTA ES LA CLAVE! Fuerza a Spring Boot a ejecutar data.sql DESPUÉS de que Hibernate cree las tablas
spring.jpa.defer-datasource-initialization=true

# Asegura que siempre se ejecute la inicialización de scripts de datos
spring.sql.init.mode=always

# ===================================================================
# CONFIGURACIÓN DE SWAGGER / OPENAPI
# ===================================================================
# Ruta para acceder a la interfaz gráfica de Swagger
springdoc.swagger-ui.path=/swagger-ui.html
# Ruta donde se sirve el JSON puro de la especificación OpenAPI
springdoc.api-docs.path=/api-docs